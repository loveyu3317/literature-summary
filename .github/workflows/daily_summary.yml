name: Daily Literature Summary

on:
  schedule:
    # 9:30 AM ET (Eastern Time)
    # EDT (UTC-4, Mar-Nov): 13:30 UTC
    # EST (UTC-5, Nov-Mar): 14:30 UTC
    - cron: '30 13 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers and generate summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}  # Optional: higher PubMed rate limit
        run: python scripts/fetch_papers.py

      - name: Create GitHub Issue with summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('daily_summary.md', 'utf8');
            const dateStr = new Date().toISOString().split('T')[0];

            // Create label if it doesn't exist
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'daily-summary',
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'daily-summary',
                color: '0075ca',
                description: 'Automated daily literature summary',
              });
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `\u{1F4DA} \u6587\u732e\u65E5\u62A5 | Daily Summary ${dateStr}`,
              body: summary,
              labels: ['daily-summary'],
            });

            console.log(`Issue #${issue.data.number} created: ${issue.data.html_url}`);
